services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kinomania
      POSTGRES_USER: kinomania
      POSTGRES_PASSWORD: kinomania
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinomania"]
      interval: 5s
      retries: 10
volumes:
  pg_data:
