name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SECRET_KEY: ci-secret-not-for-prod
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1
  DATABASE_URL: sqlite:///dummy.db

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy .

      - name: Bandit (security lint)
        run: poetry run bandit -c pyproject.toml -r apps settings

      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Validate prod compose file
        run: |
          cp .env.prod.example .env.prod
          docker compose -f docker-compose.prod.yml config >/dev/null
          rm .env.prod

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kinomania_test
          POSTGRES_USER: kinomania
          POSTGRES_PASSWORD: kinomania
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinomania"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Pytest with coverage
        run: poetry run pytest --cov-fail-under=80
        env:
          DATABASE_URL: postgres://kinomania:kinomania@localhost:5432/kinomania_test
          SECRET_KEY: ci-secret-not-for-prod
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Django deploy check (in built image)
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=settings.prod \
            -e SECRET_KEY=ci-not-for-prod-0123456789abcdefghijklmnopqrstuvwxyz \
            -e DATABASE_URL=sqlite:///dummy.db \
            -e ALLOWED_HOSTS=kinomaniak.bnbg.pl \
            -e CSRF_TRUSTED_ORIGINS=https://kinomaniak.bnbg.pl \
            --entrypoint python \
            ghcr.io/${{ github.repository }}:${{ github.sha }} \
            manage.py check --deploy --fail-level WARNING

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/kinomania
            git pull --ff-only
            ./deploy/deploy.sh
