name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SECRET_KEY: ci-secret-not-for-prod
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1
  DATABASE_URL: sqlite:///dummy.db

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kinomania_test
          POSTGRES_USER: kinomania
          POSTGRES_PASSWORD: kinomania
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinomania"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Pytest with coverage
        run: poetry run pytest --cov-fail-under=0
        env:
          DATABASE_URL: postgres://kinomania:kinomania@localhost:5432/kinomania_test
          SECRET_KEY: ci-secret-not-for-prod
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
