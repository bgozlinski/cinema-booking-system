# Pre-commit hooks dla KinoMania.
# Setup: poetry run pre-commit install && poetry run pre-commit install --hook-type pre-push
# Manual run on all files: poetry run pre-commit run --all-files


repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
        - id: trailing-whitespace
        - id: end-of-file-fixer
        - id: check-yaml
        - id: check-toml
        - id: check-added-large-files
          args: ["--maxkb=500"]
        - id: check-merge-conflict
        - id: detect-private-key

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.12
      hooks:
        - id: ruff
          args: [--fix]
        - id: ruff-format

    - repo: local
      hooks:
        - id: mypy
          name: mypy
          entry: poetry run mypy
          language: system
          types: [ python ]
          pass_filenames: false
          args: [ . ]

        - id: pytest-fast
          name: pytest (fast subset, no coverage)
          entry: poetry run pytest -x -m "not integration" --no-cov
          language: system
          pass_filenames: false
          stages: [pre-push]
